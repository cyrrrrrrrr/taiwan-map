<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>台灣互動地圖</title>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/topojson-client@3"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
}

svg {
  width: 100%;
  height: 100vh;
}

.county {
  fill: #cfd8dc;
  stroke: #fff;
  cursor: pointer;
}

.county:hover {
  fill: #ffde59;
}

.tooltip {
  position: absolute;
  background: rgba(0,0,0,0.7);
  color: #fff;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 14px;
  pointer-events: none;
  display: none;
}
</style>
</head>

<body>

<div class="tooltip" id="tip"></div>
<svg id="map"></svg>

<script>
const svg = d3.select("#map");
const g = svg.append("g");
const tip = document.getElementById("tip");

/* 🔥 載入你的 topojson */
d3.json("data/taiwanmap.json").then(data => {

const counties = data.features;

  const projection = d3.geoMercator()
    .center([121, 23.7])
    .scale(6000)
    .translate([window.innerWidth/2, window.innerHeight/2]);

  const path = d3.geoPath().projection(projection);

  g.selectAll("path")
    .data(counties)
    .enter()
    .append("path")
    .attr("class", "county")
    .attr("d", path)

.on("mousemove", (event, d) => {
  const name =
    d.properties.C_Name ||
    d.properties.COUNTYNAME ||
    d.properties.name ||
    "未知";

  tip.style.display = "block";
  tip.innerHTML = name;

  tip.style.left = event.pageX + 10 + "px";
  tip.style.top = event.pageY + 10 + "px";
})

    .on("mouseleave", () => {
      tip.style.display = "none";
    })

.on("click", (event, d) => {
  const name =
    d.properties.C_Name ||
    d.properties.COUNTYNAME ||
    d.properties.name ||
    "未知";

  alert("點擊：" + name);
});

});
</script>

</body>
</html>
