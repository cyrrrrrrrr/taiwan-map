<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>雙地圖（台灣）</title>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/topojson-client@3"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
}

/* 兩張地圖各佔一半 */
svg {
  width: 50%;
  height: 100vh;
  border: 1px solid #ccc;
}

.town {
  fill: #cfd8dc;
  stroke: #fff;
  stroke-width: 0.3;
  cursor: pointer;
}

.town:hover {
  fill: #ff9800;
}

.tooltip {
  position: absolute;
  background: rgba(0,0,0,0.75);
  color: #fff;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 14px;
  pointer-events: none;
  display: none;
}
</style>
</head>

<body>

<div class="tooltip" id="tip"></div>

<!-- 🔥 兩個不同ID -->
<svg id="map1"></svg>
<svg id="map2"></svg>

<script>
const tip = document.getElementById("tip");

/* 🔥 共用畫地圖函式 */
function drawMap(svgId) {

  const svg = d3.select(svgId);
  const g = svg.append("g");

  d3.json("https://cdn.jsdelivr.net/npm/taiwan-atlas/towns-10t.json").then(topology => {

    const geo = topojson.feature(
      topology,
      topology.objects.towns
    );

    const width = window.innerWidth / 2;
    const height = window.innerHeight;

    const projection = d3.geoMercator()
      .center([121, 23.7])
      .scale(8000)
      .translate([width/2, height/2]);

    const path = d3.geoPath().projection(projection);

    g.selectAll("path")
      .data(geo.features)
      .enter()
      .append("path")
      .attr("class", "town")
      .attr("d", path)

      /* hover */
      .on("mousemove", (event, d) => {
        const name = d.properties.COUNTYNAME + d.properties.TOWNNAME;

        tip.style.display = "block";
        tip.innerHTML = name;
        tip.style.left = event.pageX + 10 + "px";
        tip.style.top = event.pageY + 10 + "px";
      })

      .on("mouseleave", () => {
        tip.style.display = "none";
      })

      /* click */
      .on("click", (event, d) => {
        alert(d.properties.COUNTYNAME + d.properties.TOWNNAME);
      });

  });
}

/* 🔥 畫兩張地圖 */
drawMap("#map1");
drawMap("#map2");

</script>

</body>
</html>
