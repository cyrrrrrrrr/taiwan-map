<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>台灣真實地圖（高精度）</title>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/topojson-client@3"></script>

<style>
body { margin: 0; font-family: Arial; }
svg { width: 100%; height: 100vh; }

.town {
  fill: #cfd8dc;
  stroke: #fff;
  stroke-width: 0.3;
  cursor: pointer;
}

.town:hover {
  fill: #ff9800;
}

.tooltip {
  position: absolute;
  background: rgba(0,0,0,0.75);
  color: #fff;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 14px;
  pointer-events: none;
  display: none;
}
</style>
</head>

<body>

<div class="tooltip" id="tip"></div>
<svg id="map"></svg>

<script>
const svg = d3.select("#map");
const g = svg.append("g");
const tip = document.getElementById("tip");

/* 🔥 載入「真實台灣 TopoJSON」 */
d3.json("https://cdn.jsdelivr.net/npm/taiwan-atlas/towns-10t.json").then(topology => {

  const geo = topojson.feature(
    topology,
    topology.objects.towns
  );

  const projection = d3.geoMercator()
    .center([121, 23.7])
    .scale(8000)
    .translate([window.innerWidth/2, window.innerHeight/2]);

  const path = d3.geoPath().projection(projection);

  g.selectAll("path")
    .data(geo.features)
    .enter()
    .append("path")
    .attr("class", "town")
    .attr("d", path)

    /* hover */
    .on("mousemove", (event, d) => {
      const name = d.properties.COUNTYNAME + d.properties.TOWNNAME;

      tip.style.display = "block";
      tip.innerHTML = name;
      tip.style.left = event.pageX + 10 + "px";
      tip.style.top = event.pageY + 10 + "px";
    })

    .on("mouseleave", () => {
      tip.style.display = "none";
    })

    /* click */
    .on("click", (event, d) => {
      alert(d.properties.COUNTYNAME + d.properties.TOWNNAME);
    });

});
</script>

</body>
</html>
